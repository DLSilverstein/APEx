                            comp_flow3: { label: 'N2 Flow', type: 'variable', value: 'n_N21 [mol N2/h]', options: ['n_N21 [mol N2/h]', '0.04 * n1 [mol N2/h]', 'yN21 * n1 [mol/h]', 'n_N2_fresh [mol/h]'] }
                        }
                    },
                    liquid_product: {
                        name: 'Liquid Product',
                        fields: {
                            flowrate: { label: 'Flowrate', type: 'variable', value: 'n_MeOH [mol/h]', options: ['n_MeOH [mol/h]', 'n_prod [kg/h]', 'n3', 'Pure Methanol'] }
                        },
                        componentFields: {
                            comp_flow1: { label: 'MeOH Flow', type: 'variable', value: 'n_MeOH [mol MeOH/h]', options: ['n_MeOH [mol MeOH/h]', 'n_prod [mol/h]', 'n_MeOH_prod [mol/h]', 'Pure Methanol'] }
                        }
                    },
                    purge: {
                        name: 'Purge Stream',
                        fields: {
                            flowrate: { label: 'Flowrate', type: 'variable', value: 'n_p [mol/h]', options: ['n_p [mol/h]', 'n_r [mol/h]', 'n_purge [kg/h]', 'n_split'] },
                            comp1: { label: 'CO Fraction', type: 'variable', value: 'yCO3 [mol CO/mol]', options: ['yCO3 [mol CO/mol]', 'yCO_p', '0.32 mol CO/mol', 'yCO1'] }
                        },
                        componentFields: {
                            comp_flow1: { label: 'CO Flow', type: 'variable', value: 'yCO3 * n_p [mol CO/h]', options: ['yCO3 * n_p [mol CO/h]', 'n_CO_p [mol/h]', '0.32 * n_p [mol CO/h]', 'yCO1 * n_p [mol CO/h]'] },
                            comp_flow2: { label: 'H2 Flow', type: 'variable', value: 'yH23 * n_p [mol H2/h]', options: ['yH23 * n_p [mol H2/h]', 'n_H2_p [mol/h]', '0.64 * n_p [mol H2/h]', 'yH21 * n_p [mol H2/h]'] },
                            comp_flow3: { label: 'N2 Flow', type: 'variable', value: 'yN23 * n_p [mol N2/h]', options: ['yN23 * n_p [mol N2/h]', 'n_N2_p [mol/h]', '0.04 * n_p [mol N2/h]', 'yN21 * n_p [mol N2/h]'] }
                        }
                    },
                    recycle: {
                        name: 'Recycle Stream',
                        fields: {
                            flowrate: { label: 'Flowrate', type: 'variable', value: 'n_r [mol/h]', options: ['n_r [mol/h]', 'n_p [mol/h]', 'n_recycle [kg/h]', 'n_split'] },
                            comp1: { label: 'CO Fraction', type: 'variable', value: 'yCO3 [mol CO/mol]', options: ['yCO3 [mol CO/mol]', 'yCO_r', 'yCO1', '0.32 mol CO/mol'] }
                        },
                        componentFields: {
                            comp_flow1: { label: 'CO Flow', type: 'variable', value: 'yCO3 * n_r [mol CO/h]', options: ['yCO3 * n_r [mol CO/h]', 'n_CO_r [mol/h]', '0.32 * n_r [mol CO/h]', 'yCO1 * n_r [mol CO/h]'] },
                            comp_flow2: { label: 'H2 Flow', type: 'variable', value: 'yH23 * n_r [mol H2/h]', options: ['yH23 * n_r [mol H2/h]', 'n_H2_r [mol/h]', '0.64 * n_r [mol H2/h]', 'yH21 * n_r [mol H2/h]'] },
                            comp_flow3: { label: 'N2 Flow', type: 'variable', value: 'yN23 * n_r [mol N2/h]', options: ['yN23 * n_r [mol N2/h]', 'n_N2_r [mol/h]', '0.04 * n_r [mol N2/h]', 'yN21 * n_r [mol N2/h]'] }
                        }
                    }
                },
                dof: {
                    unknowns: 8,
                    balances: 6,
                    relations: 2,
                    answer: 0,
                    explanation: 'The structure of your balance calculations scales dynamically with the labeling mode, but target DoF remains 0. Splitting streams are always constrained to match parent compositions.'
                }
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('tutorial');
            const [scenarioIndex, setScenarioIndex] = useState(0);
            const [userSelections, setUserSelections] = useState({});
            const [streamModes, setStreamModes] = useState({}); // Stores mode for each stream: 'total' or 'component'
            const [showResult, setShowResult] = useState(false);
            const [quizScore, setQuizScore] = useState(0);
            const [showDofQuiz, setShowDofQuiz] = useState(false);
            const [userDofGuess, setUserDofGuess] = useState('');
            const [dofChecked, setDofChecked] = useState(false);
            const [sandboxStreams, setSandboxStreams] = useState([
                { id: 'S1', type: 'Feed', flow: '100 kg/h', species: [{ name: 'A', frac: '0.40' }, { name: 'B', frac: '0.60' }] },
                { id: 'S2', type: 'Product 1', flow: 'm2 [kg/h]', species: [{ name: 'A', frac: 'x2' }, { name: 'B', frac: '1 - x2' }] }
            ]);
            const [activeTutorialSlide, setActiveTutorialSlide] = useState(0);
            const [showEmbedHelper, setShowEmbedHelper] = useState(false);

            const containerRef = useRef(null);
            const scenario = SCENARIOS[scenarioIndex];

            // Reset workspace when switching challenges & set default modes to total
            useEffect(() => {
                setUserSelections({});
                setShowResult(false);
                setShowDofQuiz(false);
                setUserDofGuess('');
                setDofChecked(false);
                
                const defaultModes = {};
                Object.keys(scenario.streams).forEach(streamId => {
                    defaultModes[streamId] = 'total';
                });
                setStreamModes(defaultModes);
            }, [scenarioIndex]);

            // Automatically notify LMS iframe parents of dimensions if supported
            useEffect(() => {
                const sendHeightToLms = () => {
                    if (window.parent && window.parent !== window) {
                        const height = containerRef.current?.scrollHeight || document.documentElement.scrollHeight;
                        window.parent.postMessage({ type: 'resize-iframe', height: height }, '*');
                    }
                };
                
                sendHeightToLms();
                const resizeObserver = new ResizeObserver(() => sendHeightToLms());
                if (containerRef.current) {
                    resizeObserver.observe(containerRef.current);
                }
                return () => resizeObserver.disconnect();
            }, [activeTab, scenarioIndex, showResult, showDofQuiz, dofChecked, sandboxStreams, streamModes]);

            const handleSelectLabel = (streamId, fieldKey, mode, value) => {
                setUserSelections(prev => ({
                    ...prev,
                    [`${streamId}_${fieldKey}_${mode}`]: value
                }));
            };

            const toggleStreamMode = (streamId, mode) => {
                setStreamModes(prev => ({
                    ...prev,
                    [streamId]: mode
                }));
            };

            const checkLabels = () => {
                let allCorrect = true;
                Object.keys(scenario.streams).forEach(streamId => {
                    const stream = scenario.streams[streamId];
                    const activeMode = streamModes[streamId] || 'total';
                    const targetFields = activeMode === 'component' ? stream.componentFields : stream.fields;
                    
                    if (targetFields) {
                        Object.keys(targetFields).forEach(fieldKey => {
                            const correctVal = targetFields[fieldKey].value;
                            const userVal = userSelections[`${streamId}_${fieldKey}_${activeMode}`];
                            if (userVal !== correctVal) {
                                allCorrect = false;
                            }
                        });
                    }
                });

                setShowResult(true);
                if (allCorrect) {
                    setQuizScore(prev => prev + 10);
                    setShowDofQuiz(true);
                }
            };

            const checkDof = () => {
                setDofChecked(true);
            };

            const handleNextLevel = () => {
                if (scenarioIndex < SCENARIOS.length - 1) {
                    setScenarioIndex(prev => prev + 1);
                } else {
                    setActiveTab('sandbox');
                }
            };

            const addSandboxStream = () => {
                const nextId = `S${sandboxStreams.length + 1}`;
                setSandboxStreams(prev => [
                    ...prev,
                    { id: nextId, type: 'Intermediate', flow: '?', species: [{ name: 'A', frac: '?' }] }
                ]);
            };

            const updateSandboxStream = (index, key, value) => {
                setSandboxStreams(prev => {
                    const updated = [...prev];
                    updated[index][key] = value;
                    return updated;
                });
            };

            const updateSandboxSpecies = (streamIndex, specIndex, key, value) => {
                setSandboxStreams(prev => {
                    const updated = [...prev];
                    const stream = { ...updated[streamIndex] };
                    const species = [...stream.species];
                    species[specIndex] = { ...species[specIndex], [key]: value };
                    stream.species = species;
                    updated[streamIndex] = stream;
                    return updated;
                });
            };

            const addSandboxSpecies = (streamIndex) => {
                setSandboxStreams(prev => {
                    const updated = [...prev];
                    const stream = { ...updated[streamIndex] };
                    stream.species = [...stream.species, { name: 'New Component', frac: '0.00' }];
                    updated[streamIndex] = stream;
                    return updated;
                });
            };

            const isFieldCorrect = (streamId, fieldKey, mode) => {
                const targetFields = mode === 'component' ? scenario.streams[streamId].componentFields : scenario.streams[streamId].fields;
                if (!targetFields || !targetFields[fieldKey]) return false;
                return userSelections[`${streamId}_${fieldKey}_${mode}`] === targetFields[fieldKey].value;
            };

            const getAccuracyRate = () => {
                let totalFields = 0;
                let correctFields = 0;
                Object.keys(scenario.streams).forEach(streamId => {
                    const stream = scenario.streams[streamId];
                    const activeMode = streamModes[streamId] || 'total';
                    const targetFields = activeMode === 'component' ? stream.componentFields : stream.fields;
                    
                    if (targetFields) {
                        Object.keys(targetFields).forEach(fieldKey => {
                            totalFields++;
                            if (userSelections[`${streamId}_${fieldKey}_${activeMode}`] === targetFields[fieldKey].value) {
                                correctFields++;
                            }
                        });
                    }
                });
                return totalFields > 0 ? Math.round((correctFields / totalFields) * 100) : 0;
            };

            const allSelected = () => {
                let totalFields = 0;
                let answeredFields = 0;
                Object.keys(scenario.streams).forEach(streamId => {
                    const stream = scenario.streams[streamId];
                    const activeMode = streamModes[streamId] || 'total';
                    const targetFields = activeMode === 'component' ? stream.componentFields : stream.fields;
                    
                    if (targetFields) {
                        Object.keys(targetFields).forEach(fieldKey => {
                            totalFields++;
                            if (userSelections[`${streamId}_${fieldKey}_${activeMode}`]) {
                                answeredFields++;
                            }
                        });
                    }
                });
                return totalFields === answeredFields && totalFields > 0;
            };

            // Custom Stream Renderer helper to build dynamic selector fields and toggle pills
            const renderStreamOverlay = (streamId, titleText) => {
                const activeMode = streamModes[streamId] || 'total';
                const hasComponentFlow = !!scenario.streams[streamId].componentFields;
                const fieldsToRender = activeMode === 'component' ? scenario.streams[streamId].componentFields : scenario.streams[streamId].fields;

                return (
                    <div className="bg-slate-950/90 border border-slate-800 p-2.5 rounded-xl space-y-1.5 shadow-md w-60">
                        {/* Header & Toggle Section */}
                        <div className="flex flex-col space-y-1 border-b border-slate-800/80 pb-1.5">
                            <div className="text-[10px] font-bold text-indigo-400 uppercase tracking-wider">{titleText}</div>
                            {hasComponentFlow && (
                                <div className="flex bg-slate-900 border border-slate-800 p-0.5 rounded-md text-[8px] font-bold">
                                    <button 
                                        onClick={() => toggleStreamMode(streamId, 'total')}
                                        className={`flex-1 py-0.5 px-1 rounded-sm transition-all ${activeMode === 'total' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        Total + Comp
                                    </button>
                                    <button 
                                        onClick={() => toggleStreamMode(streamId, 'component')}
                                        className={`flex-1 py-0.5 px-1 rounded-sm transition-all ${activeMode === 'component' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-white'}`}
                                    >
                                        Comp Flows
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Fields List */}
                        <div className="space-y-1 mt-1">
                            {fieldsToRender && Object.keys(fieldsToRender).map((fieldKey) => (
                                <div key={fieldKey} className="flex items-center justify-between space-x-1">
                                    <span className="text-[9px] text-slate-400 shrink-0 font-semibold">{fieldsToRender[fieldKey].label}:</span>
                                    <select
                                        value={userSelections[`${streamId}_${fieldKey}_${activeMode}`] || ''}
                                        onChange={(e) => handleSelectLabel(streamId, fieldKey, activeMode, e.target.value)}
                                        className={`text-[10px] py-0.5 px-1 rounded font-mono border bg-slate-900 text-slate-100 max-w-[140px] truncate ${
                                            showResult 
                                                ? isFieldCorrect(streamId, fieldKey, activeMode) 
                                                    ? 'border-emerald-500 bg-emerald-950/30' 
                                                    : 'border-rose-500 bg-rose-950/30'
                                                : 'border-slate-800 focus:border-indigo-500'
                                        }`}
                                    >
                                        <option value="">-- select --</option>
                                        {fieldsToRender[fieldKey].options.map(opt => (
                                            <option key={opt} value={opt}>{opt}</option>
                                        ))}
                                    </select>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div ref={containerRef} className="w-full min-h-screen bg-slate-900 text-slate-100 flex flex-col font-sans antialiased selection:bg-indigo-500/30">
                    {/* HEADER NAVBAR */}
                    <header className="bg-slate-950 border-b border-slate-800 sticky top-0 z-50 px-4 py-3 sm:px-6 flex flex-col sm:flex-row items-center justify-between gap-3">
                        <div className="flex items-center space-x-3 self-start sm:self-auto">
                            <div className="bg-gradient-to-tr from-indigo-500 to-purple-500 p-2 rounded-lg text-white shadow-lg shadow-indigo-500/20">
                                <SlidersIcon className="h-5 w-5" />
                            </div>
                            <div>
                                <h1 className="text-lg font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">
                                    FlowSheet Master
                                </h1>
                                <p className="text-[10px] text-indigo-400 font-medium tracking-wide uppercase">LMS Training Edition</p>
                            </div>
                        </div>

                        {/* Global Navigation Tabs */}
                        <nav className="flex space-x-1 bg-slate-900 p-1 rounded-xl border border-slate-800 w-full sm:w-auto overflow-x-auto">
                            <button
                                onClick={() => setActiveTab('tutorial')}
                                className={`flex-1 sm:flex-initial flex items-center justify-center space-x-2 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 whitespace-nowrap ${
                                    activeTab === 'tutorial'
                                        ? 'bg-indigo-600 text-white shadow-md'
                                        : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                }`}
                            >
                                <BookOpenIcon />
                                <span>Training Guide</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('practice')}
                                className={`flex-1 sm:flex-initial flex items-center justify-center space-x-2 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 whitespace-nowrap ${
                                    activeTab === 'practice'
                                        ? 'bg-indigo-600 text-white shadow-md'
                                        : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                }`}
                            >
                                <LayersIcon />
                                <span>Active Challenges</span>
                            </button>
                            <button
                                onClick={() => setActiveTab('sandbox')}
                                className={`flex-1 sm:flex-initial flex items-center justify-center space-x-2 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 whitespace-nowrap ${
                                    activeTab === 'sandbox'
                                        ? 'bg-indigo-600 text-white shadow-md'
                                        : 'text-slate-400 hover:text-white hover:bg-slate-800'
                                }`}
                            >
                                <TrendingUpIcon />
                                <span>DoF Sandbox</span>
                            </button>
                        </nav>

                        {/* Embed Helper Button & Score Badge */}
                        <div className="flex items-center space-x-2 self-end sm:self-auto">
                            <button
                                onClick={() => setShowEmbedHelper(true)}
                                className="flex items-center space-x-1 px-2.5 py-1.5 bg-slate-900 hover:bg-slate-800 text-[10px] font-bold text-indigo-400 rounded-lg border border-slate-800 hover:border-indigo-500/20 transition-all"
                                title="Get LMS Explicit Embed Code"
                            >
                                <SettingsIcon />
                                <span>LMS Embed Setup</span>
                            </button>
                            <div className="flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-indigo-500/20">
                                <AwardIcon />
                                <span className="text-xs font-bold text-slate-300">XP: <span className="text-indigo-400 text-sm">{quizScore}</span></span>
                            </div>
                        </div>
                    </header>

                    {/* BLACKBOARD / LMS EXPLICIT EMBED CODE HELPER MODAL */}
                    {showEmbedHelper && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-lg w-full p-6 shadow-2xl relative">
                                <div className="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
                                    <h3 className="text-sm font-bold text-white uppercase tracking-wider flex items-center space-x-2">
                                        <SlidersIcon className="h-4 w-4 text-indigo-400" />
                                        <span>Blackboard Embed Size Fix</span>
                                    </h3>
                                    <button 
                                        onClick={() => setShowEmbedHelper(false)}
                                        className="text-slate-400 hover:text-white font-bold text-sm"
                                    >
                                        ✕
                                    </button>
                                </div>
                                <p className="text-xs text-slate-300 mb-3 leading-relaxed">
                                    Blackboard often limits dynamic iframe sizing. Copy and paste the explicit HTML snippet below into your Blackboard / Canvas page HTML code editor to force the app to display perfectly at <strong>780px high</strong>:
                                </p>
                                <div className="bg-slate-950 p-3 rounded-lg border border-slate-800 mb-4">
                                    <code className="text-[11px] font-mono text-indigo-400 select-all break-all block">
                                        {`<iframe src="[YOUR_APP_LINK_HERE]" width="100%" height="780" style="width: 100%; height: 780px; min-height: 780px; border: none; overflow: auto;" scrolling="yes"></iframe>`}
                                    </code>
                                </div>
                                <div className="text-[10px] text-slate-400 flex items-start space-x-2 bg-indigo-950/20 p-3 rounded-lg border border-indigo-900/30">
                                    <InfoIcon />
                                    <span><strong>Teacher Guide:</strong> Simply replace <code className="text-indigo-300">[YOUR_APP_LINK_HERE]</code> with the actual URL address of this uploaded file inside your LMS files collection.</span>
                                </div>
                                <div className="mt-5 flex justify-end">
                                    <button
                                        onClick={() => setShowEmbedHelper(false)}
                                        className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-xs px-4 py-2 rounded-xl transition-all"
                                    >
                                        Dismiss Instructions
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* TAB 1: TUTORIAL GUIDE */}
                        {activeTab === 'tutorial' && (
                            <div className="lg:col-span-12 space-y-6">
                                <div className="bg-slate-950 border border-slate-800 rounded-2xl p-6 relative overflow-hidden">
                                    <div className="absolute right-0 top-0 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
                                    <div className="max-w-3xl">
                                        <span className="text-xs font-bold uppercase tracking-wider text-indigo-400 bg-indigo-950 px-2.5 py-1 rounded-full border border-indigo-900">
                                            Process Flowchart Lesson
                                        </span>
                                        <h2 className="text-2xl sm:text-3xl font-extrabold text-white mt-3 leading-tight">
                                            How to Completely Label a Chemical Process Flowchart
                                        </h2>
                                        <p className="text-slate-400 mt-2 text-sm sm:text-base leading-relaxed">
                                            In chemical engineering mass balances (e.g., Felder & Rousseau), learning how to write down knowns and unknowns correctly is 90% of the battle. This training guide introduces the standard rules of flowcharting.
                                        </p>
                                    </div>

                                    {/* Interactive Cards */}
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                                        <div 
                                            onClick={() => setActiveTutorialSlide(0)}
                                            className={`cursor-pointer p-5 rounded-xl border transition-all duration-200 ${
                                                activeTutorialSlide === 0 
                                                    ? 'bg-slate-900 border-indigo-500 shadow-md ring-1 ring-indigo-500/20' 
                                                    : 'bg-slate-900/50 border-slate-800 hover:border-slate-700'
                                            }`}
                                        >
                                            <div className="h-9 w-9 bg-indigo-500/10 rounded-lg flex items-center justify-center text-indigo-400 font-bold mb-3">1</div>
                                            <h3 className="text-base sm:text-lg font-bold text-slate-100">Rule 1: Continuous Stream Identification</h3>
                                            <p className="text-slate-400 text-xs sm:text-sm mt-1.5 leading-relaxed">
                                                Identify every flow rate (e.g., mass rate <span className="font-mono text-indigo-300">m</span> in kg/h or molar rate <span className="font-mono text-indigo-300">n</span> in mol/h) explicitly. If it is unknown, assign a clear variable name.
                                            </p>
                                        </div>

                                        <div 
                                            onClick={() => setActiveTutorialSlide(1)}
                                            className={`cursor-pointer p-5 rounded-xl border transition-all duration-200 ${
                                                activeTutorialSlide === 1 
                                                    ? 'bg-slate-900 border-indigo-500 shadow-md ring-1 ring-indigo-500/20' 
                                                    : 'bg-slate-900/50 border-slate-800 hover:border-slate-700'
                                            }`}
                                        >
                                            <div className="h-9 w-9 bg-indigo-500/10 rounded-lg flex items-center justify-center text-indigo-400 font-bold mb-3">2</div>
                                            <h3 className="text-base sm:text-lg font-bold text-slate-100">Rule 2: Component Specifying</h3>
                                            <p className="text-slate-400 text-xs sm:text-sm mt-1.5 leading-relaxed">
                                                Write down fractions for all chemical species. If a stream has <span className="font-mono text-indigo-300">N</span> components, you must label <span className="font-mono text-indigo-300">N - 1</span> fractions because they must sum to 1.
                                            </p>
                                        </div>

                                        <div 
                                            onClick={() => setActiveTutorialSlide(2)}
                                            className={`cursor-pointer p-5 rounded-xl border transition-all duration-200 ${
                                                activeTutorialSlide === 2 
                                                    ? 'bg-slate-900 border-indigo-500 shadow-md ring-1 ring-indigo-500/20' 
                                                    : 'bg-slate-900/50 border-slate-800 hover:border-slate-700'
                                            }`}
                                        >
                                            <div className="h-9 w-9 bg-indigo-500/10 rounded-lg flex items-center justify-center text-indigo-400 font-bold mb-3">3</div>
                                            <h3 className="text-base sm:text-lg font-bold text-slate-100">Rule 3: Splitters vs Units</h3>
                                            <p className="text-slate-400 text-xs sm:text-sm mt-1.5 leading-relaxed">
                                                A pure stream splitter divides flow rates, but <b>keeps compositions identical</b>. A separation unit (like distillation) changes both compositions and flow rates.
                                            </p>
                                        </div>
                                    </div>

                                                <span className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-wider text-slate-500">Total Streams</span>
                                                <span className="text-lg sm:text-2xl font-extrabold text-teal-400">{sandboxStreams.length}</span>
                                            </div>

                                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                                                <span className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-wider text-slate-500">Suggested Balances</span>
                                                <span className="text-lg sm:text-2xl font-extrabold text-amber-500">
                                                    {sandboxStreams.length > 0 ? Math.max(0, sandboxStreams[0].species.length) : 0}
                                                </span>
                                            </div>

                                            <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
                                                <span className="block text-[9px] sm:text-[10px] font-bold uppercase tracking-wider text-slate-500">DoF Estimate</span>
                                                <span className="text-lg sm:text-2xl font-extrabold text-indigo-400">
                                                    {Math.max(0, sandboxStreams.filter(st => st.flow.includes('[') || st.species.some(sp => sp.frac.includes('x') || sp.frac.includes('-'))).length - (sandboxStreams.length > 0 ? sandboxStreams[0].species.length : 0))}
                                                </span>
                                            </div>
                                        </div>

                                        <div className="mt-4 text-[11px] sm:text-xs text-slate-500 flex items-start space-x-2">
                                            <InfoIcon />
                                            <span>
                                                This estimation assumes a single node processor. In complex systems, internal recycle loops or multi-unit dividers affect equations.
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer className="bg-slate-950 border-t border-slate-800 py-6 px-4 mt-auto">
                        <div className="max-w-7xl w-full mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-slate-500">
                            <div>
                                <span className="font-bold text-slate-400">FlowSheet Master</span> - Chemical Process Engineering Training Tool.
                            </div>
                            <div className="flex space-x-4">
                                <span>Ideal for Felder & Rousseau Material Balances Prep</span>
                                <span>•</span>
                                <span>DoF Calculator v2.1</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        // Mount the React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
