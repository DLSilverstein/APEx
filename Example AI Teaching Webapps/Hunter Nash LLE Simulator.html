<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hunter-Nash Method</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    // --- Inline Icons ---
    const Settings = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    );
    const AlertTriangle = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
    );
    const ZoomInIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
    );
    const ZoomOutIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
    );
    const ResetIcon = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
    );

    // --- Synthetic Data for Binodal Curve & Tie Lines ---
    const SYSTEMS = {
      system1: {
        id: 'system1', name: 'Generic Ideal System', citation: 'Synthetic Demonstration Data',
        labels: { A: 'Carrier (A)', B: 'Solute (B)', C: 'Solvent (C)' },
        R_base: [ [0.99, 0.00, 0.01], [0.90, 0.08, 0.02], [0.80, 0.17, 0.03], [0.70, 0.25, 0.05], [0.60, 0.32, 0.08], [0.50, 0.38, 0.12], [0.40, 0.43, 0.17], [0.30, 0.47, 0.23] ],
        E_base: [ [0.01, 0.00, 0.99], [0.02, 0.05, 0.93], [0.03, 0.11, 0.86], [0.05, 0.18, 0.77], [0.08, 0.25, 0.67], [0.12, 0.33, 0.55], [0.18, 0.40, 0.42], [0.30, 0.47, 0.23] ]
      },
      system2: {
        id: 'system2', name: 'Water - Acetone - MIBK', citation: 'Adapted from Geankoplis, Transport Processes, 4th Ed.',
        labels: { A: 'Water (A)', B: 'Acetone (B)', C: 'MIBK (C)' },
        R_base: [ [0.98, 0.00, 0.02], [0.92, 0.05, 0.03], [0.84, 0.12, 0.04], [0.75, 0.19, 0.06], [0.65, 0.26, 0.09], [0.55, 0.32, 0.13], [0.45, 0.37, 0.18] ],
        E_base: [ [0.02, 0.00, 0.98], [0.03, 0.08, 0.89], [0.04, 0.18, 0.78], [0.07, 0.26, 0.67], [0.12, 0.33, 0.55], [0.20, 0.37, 0.43], [0.45, 0.37, 0.18] ]
      },
      system3: {
        id: 'system3', name: 'Water - Acetic Acid - IPE', citation: 'Adapted from Treybal, Mass-Transfer Operations, 3rd Ed.',
        labels: { A: 'Water (A)', B: 'Acetic Acid (B)', C: 'IPE (C)' },
        R_base: [ [0.98, 0.00, 0.02], [0.88, 0.10, 0.02], [0.78, 0.19, 0.03], [0.68, 0.27, 0.05], [0.56, 0.35, 0.09], [0.44, 0.41, 0.15], [0.35, 0.43, 0.22] ],
        E_base: [ [0.01, 0.00, 0.99], [0.02, 0.04, 0.94], [0.04, 0.09, 0.87], [0.07, 0.15, 0.78], [0.11, 0.23, 0.66], [0.19, 0.33, 0.48], [0.35, 0.43, 0.22] ]
      }
    };

    const STEPS = 40; // Interpolation steps between base points for smoothness

    // --- Helper Math Functions ---
    function toCart(pt) {
      return { x: pt[2] + 0.5 * pt[1], y: pt[1] * Math.sqrt(3) / 2 };
    }

    function lineIntersect(p1, p2, p3, p4) {
      const denom = (p1.x - p2.x) * (p3.y - p4.y) - (p1.y - p2.y) * (p3.x - p4.x);
      if (Math.abs(denom) < 1e-6) return null;
      const t = ((p1.x - p3.x) * (p3.y - p4.y) - (p1.y - p3.y) * (p3.x - p4.x)) / denom;
      return { x: p1.x + t * (p2.x - p1.x), y: p1.y + t * (p2.y - p1.y) };
    }

    function intersectRayCurveParameterized(p1, p2, curvePts) {
      let best = null;
      let minDist = Infinity;
      for (let i = 0; i < curvePts.length - 1; i++) {
        const c1 = curvePts[i].cart;
        const c2 = curvePts[i + 1].cart;
        const denom = (p1.x - p2.x) * (c1.y - c2.y) - (p1.y - p2.y) * (c1.x - c2.x);
        if (Math.abs(denom) < 1e-6) continue;
        const t = ((p1.x - c1.x) * (c1.y - c2.y) - (p1.y - c1.y) * (c1.x - c2.x)) / denom;
        const u = -((p1.x - p2.x) * (p1.y - c1.y) - (p1.y - p2.y) * (p1.x - c1.x)) / denom;
        if (u >= 0 && u <= 1 && t > 0) {
          const ix = p1.x + t * (p2.x - p1.x);
          const iy = p1.y + t * (p2.y - p1.y);
          const dist = Math.hypot(ix - p1.x, iy - p1.y);
          if (dist < minDist) {
            minDist = dist;
            const curveT = curvePts[i].t + u * (curvePts[i + 1].t - curvePts[i].t);
            best = { cart: { x: ix, y: iy }, t: curveT };
          }
        }
      }
      return best;
    }

    function findRn(targetXb, curvePts) {
      for (let i = 0; i < curvePts.length - 1; i++) {
        const p1 = curvePts[i];
        const p2 = curvePts[i + 1];
        if ((p1.pt[1] <= targetXb && p2.pt[1] >= targetXb) || (p1.pt[1] >= targetXb && p2.pt[1] <= targetXb)) {
          if (Math.abs(p2.pt[1] - p1.pt[1]) < 1e-9) continue;
          const frac = (targetXb - p1.pt[1]) / (p2.pt[1] - p1.pt[1]);
          const interpT = p1.t + frac * (p2.t - p1.t);
          const interpX = p1.cart.x + frac * (p2.cart.x - p1.cart.x);
          const interpY = p1.cart.y + frac * (p2.cart.y - p1.cart.y);
          return { cart: { x: interpX, y: interpY }, t: interpT };
        }
      }
      return null;
    }

    function getPointByT(curvePts, targetT) {
      if (targetT <= curvePts[0].t) return curvePts[0];
      if (targetT >= curvePts[curvePts.length - 1].t) return curvePts[curvePts.length - 1];
      for (let i = 0; i < curvePts.length - 1; i++) {
        if (targetT >= curvePts[i].t && targetT <= curvePts[i + 1].t) {
          const p1 = curvePts[i];
          const p2 = curvePts[i + 1];
          const frac = (targetT - p1.t) / (p2.t - p1.t);
          const ptA = p1.pt[0] + frac * (p2.pt[0] - p1.pt[0]);
          const ptB = p1.pt[1] + frac * (p2.pt[1] - p1.pt[1]);
          const ptC = p1.pt[2] + frac * (p2.pt[2] - p1.pt[2]);
          const interpX = p1.cart.x + frac * (p2.cart.x - p1.cart.x);
          const interpY = p1.cart.y + frac * (p2.cart.y - p1.cart.y);
          return { cart: { x: interpX, y: interpY }, pt: [ptA, ptB, ptC], t: targetT };
        }
      }
      return curvePts[curvePts.length - 1];
    }

    // --- Main Application Component ---
    function App() {
      const canvasRef = useRef(null);

      // App State
      const [activeSystemId, setActiveSystemId] = useState('system1');
      const [xF_B, setXF_B] = useState(0.20); 
      const [sfRatio, setSfRatio] = useState(1.5);
      const [xRn_B, setXRn_B] = useState(0.05);

      // Zoom & Pan State
      const [zoom, setZoom] = useState(1);
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [isGrabbing, setIsGrabbing] = useState(false);
      
      const lastPanPoint = useRef({ x: 0, y: 0 });
      const initialPinchDist = useRef(null);

      const activeSystem = SYSTEMS[activeSystemId];

      // Handle Mouse / Wheel Zoom
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const handleWheel = (e) => {
          e.preventDefault(); // Prevents default page scroll when scrolling over canvas
          setZoom(z => Math.min(Math.max(0.2, z - e.deltaY * 0.002), 10));
        };

        canvas.addEventListener('wheel', handleWheel, { passive: false });
        return () => canvas.removeEventListener('wheel', handleWheel);
      }, []);

      // Interaction Handlers
      const handleMouseDown = (e) => {
        setIsGrabbing(true);
        lastPanPoint.current = { x: e.clientX, y: e.clientY };
      };
      
      const handleMouseMove = (e) => {
        if (!isGrabbing) return;
        const dx = e.clientX - lastPanPoint.current.x;
        const dy = e.clientY - lastPanPoint.current.y;
        setPan(p => ({ x: p.x + dx, y: p.y + dy }));
        lastPanPoint.current = { x: e.clientX, y: e.clientY };
      };

      const handleMouseUp = () => setIsGrabbing(false);

      const handleTouchStart = (e) => {
        if (e.touches.length === 1) {
          setIsGrabbing(true);
          lastPanPoint.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          initialPinchDist.current = Math.hypot(dx, dy);
        }
      };

      const handleTouchMove = (e) => {
        if (e.touches.length === 1 && isGrabbing) {
          const dx = e.touches[0].clientX - lastPanPoint.current.x;
          const dy = e.touches[0].clientY - lastPanPoint.current.y;
          setPan(p => ({ x: p.x + dx, y: p.y + dy }));
          lastPanPoint.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        } else if (e.touches.length === 2 && initialPinchDist.current) {
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const dist = Math.hypot(dx, dy);
          const scaleChange = dist / initialPinchDist.current;
          setZoom(z => Math.min(Math.max(0.2, z * scaleChange), 10));
          initialPinchDist.current = dist;
        }
      };

      const handleTouchEnd = () => {
        setIsGrabbing(false);
        initialPinchDist.current = null;
      };

      // Zoom Controls Handlers
      const handleZoomIn = () => setZoom(z => Math.min(z * 1.3, 10));
      const handleZoomOut = () => setZoom(z => Math.max(z / 1.3, 0.2));
      const handleResetView = () => { setZoom(1); setPan({ x: 0, y: 0 }); };

      // Generate high resolution curves for the active system
      const { R_smooth, E_smooth } = useMemo(() => {
        const R_s = [];
        const E_s = [];
        const rb = activeSystem.R_base;
        const eb = activeSystem.E_base;
        
        for (let i = 0; i < rb.length - 1; i++) {
          for (let j = 0; j < (i === rb.length - 2 ? STEPS + 1 : STEPS); j++) {
            const frac = j / STEPS;
            const interpR = [
              rb[i][0] + frac * (rb[i + 1][0] - rb[i][0]),
              rb[i][1] + frac * (rb[i + 1][1] - rb[i][1]),
              rb[i][2] + frac * (rb[i + 1][2] - rb[i][2])
            ];
            R_s.push({ pt: interpR, cart: toCart(interpR), t: i + frac });

            const interpE = [
              eb[i][0] + frac * (eb[i + 1][0] - eb[i][0]),
              eb[i][1] + frac * (eb[i + 1][1] - eb[i][1]),
              eb[i][2] + frac * (eb[i + 1][2] - eb[i][2])
            ];
            E_s.push({ pt: interpE, cart: toCart(interpE), t: i + frac });
          }
        }
        return { R_smooth: R_s, E_smooth: E_s };
      }, [activeSystem]);

      // Run Hunter-Nash Logic
      const sim = useMemo(() => {
        const F = [1 - xF_B, xF_B, 0];
        const S = [0, 0, 1];

        if (xRn_B >= xF_B) {
          return { error: "Target Raffinate Solute must be lower than Feed Solute." };
        }

        const M = [
          (F[0] + S[0] * sfRatio) / (1 + sfRatio),
          (F[1] + S[1] * sfRatio) / (1 + sfRatio),
          (F[2] + S[2] * sfRatio) / (1 + sfRatio)
        ];

        const F_cart = toCart(F);
        const S_cart = toCart(S);
        const M_cart = toCart(M);

        const rnData = findRn(xRn_B, R_smooth);
        if (!rnData) return { error: "Target Raffinate composition is physically unreachable." };
        const Rn_cart = rnData.cart;

        const e1Data = intersectRayCurveParameterized(Rn_cart, M_cart, E_smooth);
        if (!e1Data) return { error: "Mixing point (M) is in the single-phase region. Increase the S/F ratio." };
        const E1_cart = e1Data.cart;
        const E1_t = e1Data.t;

        const Delta_cart = lineIntersect(F_cart, E1_cart, S_cart, Rn_cart);
        if (!Delta_cart) return { error: "Pinch point: Operating lines are parallel (infinite stages)." };

        let current_E_t = E1_t;
        let current_E_cart = E1_cart;
        const stages = [];
        let completed = false;
        let pinchReached = false;

        for (let step = 1; step <= 30; step++) {
          const current_R = getPointByT(R_smooth, current_E_t);
          stages.push({ E: current_E_cart, R: current_R.cart, R_pt: current_R.pt });

          if (current_R.pt[1] <= xRn_B) { completed = true; break; }

          const nextEData = intersectRayCurveParameterized(Delta_cart, current_R.cart, E_smooth);
          if (!nextEData) { pinchReached = true; break; }

          if (Math.abs(nextEData.t - current_E_t) < 0.01) { pinchReached = true; break; }

          current_E_t = nextEData.t;
          current_E_cart = nextEData.cart;
        }

        return {
          success: true,
          F_cart, S_cart, M_cart, Rn_cart, E1_cart, Delta_cart, M_pt: M,
          stages, completed, pinchReached,
          error: pinchReached && !completed ? "Pinch point reached. Process requires more solvent (infinite stages)." : null
        };
      }, [xF_B, sfRatio, xRn_B, R_smooth, E_smooth]);

      // Render Canvas
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);

        const L = 500;
        const originX = 250;
        const originY = 600;

        function screenPt(cartPt) {
          const rawX = originX + cartPt.x * L;
          const rawY = originY - cartPt.y * L;
          return {
            x: w / 2 + (rawX - w / 2) * zoom + pan.x,
            y: h / 2 + (rawY - h / 2) * zoom + pan.y
          };
        }

        // --- 1. Draw Grid and Triangle ---
        ctx.lineWidth = 1;
        ctx.font = '11px sans-serif';
        ctx.fillStyle = '#9ca3af';

        for (let i = 1; i <= 9; i++) {
          const frac = i / 10;
          ctx.strokeStyle = i % 2 === 0 ? '#e5e7eb' : '#f3f4f6';

          let start = screenPt(toCart([frac, 1 - frac, 0]));
          let end = screenPt(toCart([frac, 0, 1 - frac]));
          ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();

          start = screenPt(toCart([1 - frac, frac, 0]));
          end = screenPt(toCart([0, frac, 1 - frac]));
          ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();

          start = screenPt(toCart([1 - frac, 0, frac]));
          end = screenPt(toCart([0, 1 - frac, frac]));
          ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
        }

        // Triangle Outline
        const A_pt = screenPt(toCart([1, 0, 0]));
        const B_pt = screenPt(toCart([0, 1, 0]));
        const C_pt = screenPt(toCart([0, 0, 1]));

        ctx.strokeStyle = '#111827';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(A_pt.x, A_pt.y);
        ctx.lineTo(B_pt.x, B_pt.y);
        ctx.lineTo(C_pt.x, C_pt.y);
        ctx.closePath();
        ctx.stroke();

        // Vertices Labels
        ctx.fillStyle = '#1f2937';
        ctx.font = `bold ${16 * Math.max(0.6, Math.min(zoom, 1.5))}px sans-serif`;
        ctx.textAlign = 'right'; ctx.fillText(activeSystem.labels.A, A_pt.x - 15, A_pt.y + 20);
        ctx.textAlign = 'center'; ctx.fillText(activeSystem.labels.B, B_pt.x, B_pt.y - 15);
        ctx.textAlign = 'left'; ctx.fillText(activeSystem.labels.C, C_pt.x + 15, C_pt.y + 20);

        // --- 2. Draw Binodal Curve ---
        if (R_smooth.length > 0 && E_smooth.length > 0) {
          ctx.beginPath();
          ctx.strokeStyle = '#1f2937';
          ctx.lineWidth = 2.5;
          const startR = screenPt(R_smooth[0].cart);
          ctx.moveTo(startR.x, startR.y);
          for (let pt of R_smooth) {
            const s = screenPt(pt.cart);
            ctx.lineTo(s.x, s.y);
          }
          for (let i = E_smooth.length - 1; i >= 0; i--) {
            const s = screenPt(E_smooth[i].cart);
            ctx.lineTo(s.x, s.y);
          }
          ctx.stroke();
        }

        ctx.strokeStyle = '#d1d5db';
        ctx.lineWidth = 1;
        for (let i = 0; i < activeSystem.R_base.length; i++) {
          ctx.beginPath();
          const pr = screenPt(toCart(activeSystem.R_base[i]));
          const pe = screenPt(toCart(activeSystem.E_base[i]));
          ctx.moveTo(pr.x, pr.y);
          ctx.lineTo(pe.x, pe.y);
          ctx.stroke();
        }

        // --- 3. Draw Hunter-Nash Analysis Elements ---
        if (sim.success) {
          const drawNode = (cartPt, color, label, pos = 'top', size = 5) => {
            const pt = screenPt(cartPt);
            ctx.beginPath(); ctx.arc(pt.x, pt.y, size, 0, 2 * Math.PI);
            ctx.fillStyle = color; ctx.fill();
            ctx.lineWidth = 1.5; ctx.strokeStyle = '#fff'; ctx.stroke();

            ctx.fillStyle = '#111827';
            ctx.font = `bold ${13 * Math.max(0.7, Math.min(zoom, 1.2))}px sans-serif`;
            if (pos === 'top') { ctx.textAlign = 'center'; ctx.fillText(label, pt.x, pt.y - 10); }
            else if (pos === 'bottom') { ctx.textAlign = 'center'; ctx.fillText(label, pt.x, pt.y + 18); }
            else if (pos === 'left') { ctx.textAlign = 'right'; ctx.fillText(label, pt.x - 8, pt.y + 4); }
            else if (pos === 'right') { ctx.textAlign = 'left'; ctx.fillText(label, pt.x + 8, pt.y + 4); }
          };

          ctx.strokeStyle = '#9ca3af';
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          ctx.moveTo(screenPt(sim.Rn_cart).x, screenPt(sim.Rn_cart).y);
          ctx.lineTo(screenPt(sim.E1_cart).x, screenPt(sim.E1_cart).y);
          ctx.stroke();

          ctx.strokeStyle = '#2563eb';
          ctx.beginPath();
          ctx.moveTo(screenPt(sim.F_cart).x, screenPt(sim.F_cart).y);
          ctx.lineTo(screenPt(sim.Delta_cart).x, screenPt(sim.Delta_cart).y);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(screenPt(sim.S_cart).x, screenPt(sim.S_cart).y);
          ctx.lineTo(screenPt(sim.Delta_cart).x, screenPt(sim.Delta_cart).y);
          ctx.stroke();
          ctx.setLineDash([]);

          sim.stages.forEach((stage, idx) => {
            ctx.strokeStyle = '#dc2626';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(screenPt(stage.E).x, screenPt(stage.E).y);
            ctx.lineTo(screenPt(stage.R).x, screenPt(stage.R).y);
            ctx.stroke();

            const ptR = screenPt(stage.R);
            const ptE = screenPt(stage.E);
            ctx.fillStyle = '#dc2626';
            ctx.font = `bold ${11 * Math.max(0.7, Math.min(zoom, 1.5))}px sans-serif`;
            ctx.textAlign = 'right'; ctx.fillText(`R${idx + 1}`, ptR.x - 6, ptR.y + 3);
            ctx.textAlign = 'left'; ctx.fillText(`E${idx + 1}`, ptE.x + 6, ptE.y + 3);

            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(screenPt(stage.R).x, screenPt(stage.R).y);
            ctx.lineTo(screenPt(sim.Delta_cart).x, screenPt(sim.Delta_cart).y);
            ctx.stroke();
          });

          drawNode(sim.F_cart, '#16a34a', 'F', 'left');
          drawNode(sim.S_cart, '#9333ea', 'S', 'right');
          drawNode(sim.M_cart, '#ea580c', 'M', 'bottom');
          drawNode(sim.Rn_cart, '#000000', 'Rn_target', 'left');
          drawNode(sim.Delta_cart, '#1e3a8a', 'Δ', 'top', 6);
        }
      }, [sim, activeSystem, R_smooth, E_smooth, zoom, pan]);

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col font-sans">
          <header className="bg-white border-b border-gray-200 px-6 py-4 flex items-center shadow-sm">
            <div className="bg-blue-600 p-2 rounded-lg mr-4">
              <Settings className="w-6 h-6 text-white" />
            </div>
            <div>
              <h1 className="text-xl font-bold text-gray-900">Liquid-Liquid Extraction</h1>
              <p className="text-sm text-gray-500">Hunter-Nash Ternary Diagram Method</p>
            </div>
          </header>

          <main className="flex-1 flex flex-col lg:flex-row max-w-[1600px] w-full mx-auto p-4 gap-6">
            
            {/* Left Column: Controls & Metrics */}
            <div className="w-full lg:w-80 flex flex-col gap-4">
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
                <h2 className="text-sm font-bold text-gray-900 uppercase tracking-wider mb-5 flex items-center">
                  System Parameters
                </h2>
                <div className="space-y-6">
                  <div>
                    <label className="text-sm font-medium text-gray-700 mb-3 block">Ternary System Data</label>
                    <div className="space-y-3">
                      {Object.values(SYSTEMS).map(sys => (
                        <label key={sys.id} className="flex items-start gap-2 cursor-pointer group">
                          <input 
                            type="radio" name="ternarySystem" value={sys.id}
                            checked={activeSystemId === sys.id}
                            onChange={(e) => { setActiveSystemId(e.target.value); handleResetView(); }}
                            className="mt-1 accent-blue-600 w-4 h-4"
                          />
                          <div className="flex flex-col">
                            <span className="text-sm text-gray-800 font-medium group-hover:text-blue-600 transition-colors">{sys.name}</span>
                            {activeSystemId === sys.id && ( <span className="text-xs text-gray-500 italic mt-0.5 leading-tight">{sys.citation}</span> )}
                          </div>
                        </label>
                      ))}
                    </div>
                  </div>
                  <hr className="border-gray-200" />
                  <div>
                    <div className="flex justify-between mb-1">
                      <label className="text-sm font-medium text-gray-700">Feed Solute (x<sub>F,B</sub>)</label>
                      <span className="text-sm font-bold text-blue-600">{(xF_B * 100).toFixed(0)}%</span>
                    </div>
                    <input type="range" min="0.10" max="0.45" step="0.01" value={xF_B} onChange={e => setXF_B(parseFloat(e.target.value))} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                  </div>
                  <div>
                    <div className="flex justify-between mb-1">
                      <label className="text-sm font-medium text-gray-700">Solvent/Feed Ratio</label>
                      <span className="text-sm font-bold text-blue-600">{sfRatio.toFixed(2)}</span>
                    </div>
                    <input type="range" min="0.5" max="4.0" step="0.1" value={sfRatio} onChange={e => setSfRatio(parseFloat(e.target.value))} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                  </div>
                  <div>
                    <div className="flex justify-between mb-1">
                      <label className="text-sm font-medium text-gray-700">Target Raffinate (x<sub>Rn,B</sub>)</label>
                      <span className="text-sm font-bold text-blue-600">{(xRn_B * 100).toFixed(1)}%</span>
                    </div>
                    <input type="range" min="0.01" max="0.20" step="0.01" value={xRn_B} onChange={e => setXRn_B(parseFloat(e.target.value))} className="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 flex-1">
                <h2 className="text-sm font-bold text-gray-900 uppercase tracking-wider mb-4">Analysis Results</h2>
                {sim.error ? (
                  <div className="bg-red-50 text-red-700 p-4 rounded-lg flex items-start gap-3">
                    <AlertTriangle className="w-5 h-5 shrink-0 mt-0.5" />
                    <span className="text-sm font-medium leading-relaxed">{sim.error}</span>
                  </div>
                ) : (
                  <div className="space-y-4">
                    <div className="flex justify-between items-center bg-blue-50 p-4 rounded-lg border border-blue-100">
                      <span className="text-blue-900 font-medium">Ideal Stages Needed</span>
                      <span className="text-3xl font-black text-blue-700">{sim.stages?.length || 0}</span>
                    </div>
                    <div className="grid grid-cols-2 gap-3 text-sm">
                      <div className="bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div className="text-gray-500 mb-1">Mixing Point M</div>
                        <div className="font-mono text-gray-900">{(sim.M_pt[1]*100).toFixed(1)}% B <br/>{(sim.M_pt[2]*100).toFixed(1)}% C</div>
                      </div>
                      <div className="bg-gray-50 p-3 rounded-lg border border-gray-100">
                        <div className="text-gray-500 mb-1">Final Extract E1</div>
                        <div className="font-mono text-gray-900">{sim.stages.length > 0 ? (getPointByT(E_smooth, sim.stages[0].E.t || 0).pt[1] * 100).toFixed(1) : '--'}% B</div>
                      </div>
                    </div>
                    {!sim.completed && sim.stages.length >= 30 && (
                      <p className="text-xs text-orange-600 font-medium bg-orange-50 p-2 rounded border border-orange-100">
                        Maximum iterations reached (Pinch Point approached).
                      </p>
                    )}
                  </div>
                )}
              </div>
            </div>

            {/* Right Column: Canvas */}
            <div className="flex-1 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative flex items-center justify-center min-h-[600px]">
              
              {/* Zoom Controls Overlay */}
              <div className="absolute bottom-6 left-6 bg-white/90 backdrop-blur-sm border border-gray-200 rounded-lg shadow-sm p-1 flex flex-col gap-1 z-10">
                <button onClick={handleZoomIn} className="p-2 hover:bg-gray-100 rounded text-gray-700 transition-colors" title="Zoom In">
                  <ZoomInIcon className="w-5 h-5" />
                </button>
                <button onClick={handleResetView} className="p-2 hover:bg-gray-100 rounded text-gray-700 transition-colors" title="Reset View">
                  <ResetIcon className="w-5 h-5" />
                </button>
                <button onClick={handleZoomOut} className="p-2 hover:bg-gray-100 rounded text-gray-700 transition-colors" title="Zoom Out">
                  <ZoomOutIcon className="w-5 h-5" />
                </button>
              </div>

              {/* Diagram Canvas */}
              <canvas
                ref={canvasRef}
                width={1000}
                height={700}
                className={`w-full h-auto max-w-[1000px] bg-white ${isGrabbing ? 'cursor-grabbing' : 'cursor-grab'}`}
                style={{ touchAction: 'none' }}
                onMouseDown={handleMouseDown}
                onMouseMove={handleMouseMove}
                onMouseUp={handleMouseUp}
                onMouseLeave={handleMouseUp}
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
              />

              {/* Legend Overlay */}
              <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm border border-gray-200 rounded-lg shadow-sm p-3 text-xs flex flex-col gap-2 pointer-events-none z-10">
                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-green-600"></div> Feed (F)</div>
                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-purple-600"></div> Solvent (S)</div>
                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-orange-600"></div> Mixing Pt (M)</div>
                <div className="flex items-center gap-2"><div className="w-3 h-3 rounded-full bg-blue-900"></div> Diff Pt (Δ)</div>
                <div className="flex items-center gap-2 mt-1"><div className="w-4 h-0.5 bg-red-600"></div> Tie Lines (Equilibrium)</div>
                <div className="flex items-center gap-2"><div className="w-4 h-0.5 bg-blue-500"></div> Operating Lines</div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
